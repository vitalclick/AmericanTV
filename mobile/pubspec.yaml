name: americantv
description: AmericanTV mobile app (iOS + Android).
publish_to: none
# Version contract:
#   - Marketing version (3.0.0) shows in App Store / Play Store listings.
#   - Build number (14) is what App Store Connect / Play Console deduplicate
#     by. Play Store records previous release as version 13 (2.0.2); we're
#     bumping to 14 for the first cross-platform sync.
# Codemagic overrides the build number per release (`--build-number=$BUILD_NUMBER`)
# from App Store Connect's latest + 1, but the floor lives here so a local
# `flutter build` produces a sane default.
version: 3.0.0+14

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State + DI
  flutter_riverpod: ^2.5.1

  # Routing with auth guards
  go_router: ^14.2.7

  # HTTP
  dio: ^5.7.0

  # Secure key/value storage for the Sanctum token
  flutter_secure_storage: ^9.2.2

  # Plain key/value cache for last-known feed / video detail
  shared_preferences: ^2.3.2

  # Env loading
  flutter_dotenv: ^5.1.0

  # Models — JSON serialization + immutability
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # IAP via RevenueCat (handles StoreKit 2 + Play Billing)
  purchases_flutter: ^8.1.2

  # Firebase: push, analytics, crash reporting
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3

  # Video playback
  video_player: ^2.9.2
  better_player_plus: ^1.0.8     # community fork that tracks Flutter 3.24

  # Native social login
  sign_in_with_apple: ^6.1.2
  google_sign_in: ^6.2.1

  # Misc
  cached_network_image: ^3.4.1
  intl: ^0.19.0  # pinned by flutter_localizations (transitive via better_player_plus)
  cupertino_icons: ^1.0.8
  qr_flutter: ^4.1.0
  file_picker: ^8.1.2
  wakelock_plus: ^1.2.8
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Codegen
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # Generates iOS + Android launcher icons from a single 1024x1024 source.
  # Run: `dart run flutter_launcher_icons`
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - .env

# ----- App icon generation -----
# Source: assets/icon/app-icon.png (1024x1024 PNG with no alpha for iOS).
# Adaptive: assets/icon/app-icon-adaptive-foreground.png is the foreground
# layer (transparent background) for Android adaptive icons; the
# background colour comes from #E53935 (brand red).
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app-icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#E53935"
  adaptive_icon_foreground: "assets/icon/app-icon-adaptive-foreground.png"
  web:
    generate: false
  macos:
    generate: false
  windows:
    generate: false
