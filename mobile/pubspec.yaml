name: americantv
description: AmericanTV mobile app (iOS + Android).
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State + DI
  flutter_riverpod: ^2.5.1

  # Routing with auth guards
  go_router: ^14.2.7

  # HTTP
  dio: ^5.7.0

  # Secure key/value storage for the Sanctum token
  flutter_secure_storage: ^9.2.2

  # Env loading
  flutter_dotenv: ^5.1.0

  # Models — JSON serialization + immutability
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # IAP via RevenueCat (handles StoreKit 2 + Play Billing)
  purchases_flutter: ^8.1.2

  # Firebase: push, analytics, crash reporting
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3

  # Video playback
  video_player: ^2.9.2
  better_player_plus: ^1.0.8     # community fork that tracks Flutter 3.24

  # Native social login
  sign_in_with_apple: ^6.1.2
  google_sign_in: ^6.2.1

  # Misc
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  qr_flutter: ^4.1.0
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Codegen
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - .env
