plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    // Must come AFTER android+kotlin so it can register its task graph hooks
    // against the merged Android sourceSets.
    id "com.google.gms.google-services"
}

android {
    namespace = "com.americantv.app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        // Required by flutter_local_notifications (and any other plugin that
        // pulls in java.time on minSdk < 26). Without this, AGP fails the
        // AAR metadata check at :app:checkReleaseAarMetadata.
        coreLibraryDesugaringEnabled = true
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.americantv.app"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // Signing config gets injected by Codemagic via `android_signing`
            // referencing the `uploadkey` upload — see
            // codemagic.yaml at repo root. Falls back to debug for local
            // `flutter run --release` so contributors don't need the
            // production keystore on their laptops.
            signingConfig = signingConfigs.debug
            minifyEnabled = true
            shrinkResources = true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Companion to coreLibraryDesugaringEnabled above. 2.1.4 is the floor
    // flutter_local_notifications recommends as of plugin v19.
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"

    // Required by BackgroundUploadHandler.kt (see its header comment).
    // WorkManager schedules each chunk upload as a persistable job that
    // survives app death; OkHttp is the HTTP client the worker uses.
    // Versions match the ones called out in the .kt file's docblock.
    implementation "androidx.work:work-runtime-ktx:2.9.1"
    implementation "com.squareup.okhttp3:okhttp:4.12.0"
}
