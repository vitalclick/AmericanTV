# Codemagic CI/CD configuration for AmericanTV.
#
# Workflows:
#   ios-testflight   - iOS release build, signed, uploaded to TestFlight.
#   ios-app-store    - same, but submits to App Store Review.
#   android-internal - Android AAB, signed, uploaded to Play Internal Testing.
#   android-production - same, but promoted to Production track.
#
# Required Codemagic integrations (configure in the Teams settings UI
# before first build):
#   - "App Store Connect" with an API key for team PDNU7JKBQZ.
#   - "Google Play" with a service account JSON granted Release Manager
#     access on com.americantv.app.
#   - "Firebase" if you want crashlytics symbol upload on iOS.
#
# Required environment variable groups (also in Teams settings):
#   - "americantv-prod" with the keys documented in mobile/docs/CODEMAGIC_SETUP.md.

definitions:
  setup_flutter: &setup_flutter
    # Pin Flutter rather than tracking `stable` — every implicit upgrade
    # is a new opportunity for a breaking change in dependencies (the
    # better_player_plus → intl 0.20 conflict we just hit being one).
    # 3.32.8 ships Dart 3.8.1, satisfying our pubspec `^3.5.0`. Bump
    # deliberately after testing the next stable, not implicitly.
    flutter: 3.32.8
    xcode: latest
    cocoapods: default
    java: 21

  # Shared scripts. YAML aliases can't be flattened into an outer
  # sequence (`- *list_alias` becomes one nested element, not N spread
  # items), so each script gets its own anchor and workflows reference
  # them one-by-one below.
  scripts:
    - &s_preflight
      name: Preflight — verify env vars
      # Sanity-check the env group BEFORE we spend 20 minutes building
      # only to die at the publish step. WORKFLOW (or CM_WORKFLOW_ID,
      # which Codemagic sets automatically) gates which vars are
      # required: TestFlight tolerates a missing Firebase config; App
      # Store doesn't.
      script: |
        chmod +x $CM_BUILD_DIR/mobile/scripts/codemagic-preflight.sh
        $CM_BUILD_DIR/mobile/scripts/codemagic-preflight.sh

    - &s_versions
      name: Show Flutter + Dart versions
      script: |
        flutter --version
        dart --version

    - &s_create_platforms
      name: Ensure platform projects exist
      # The android/ and ios/ directories ARE in version control from
      # 3.0.0+14 onward, so this is a safety net for fresh clones or
      # platform additions. --no-overwrite means existing files are
      # untouched; flutter only creates what's missing.
      script: |
        cd $CM_BUILD_DIR/mobile
        flutter create . \
          --org com.americantv \
          --project-name americantv \
          --platforms ios,android \
          --no-overwrite

    - &s_native_shims
      name: Layer native shims into the generated projects
      # Explicit assertions in both directions: the shim source must be
      # present in the repo, AND the target platform project must have
      # been materialized by `flutter create` above. Either missing is
      # a configuration error worth surfacing loudly — a silent skip
      # would let the build succeed with background-upload functionality
      # disabled.
      script: |
        cd $CM_BUILD_DIR/mobile

        # iOS background upload handler.
        if [ -d ios/Runner ]; then
          if [ ! -f native/ios/BackgroundUploadHandler.swift ]; then
            echo "FATAL: native/ios/BackgroundUploadHandler.swift missing in repo." >&2
            echo "The branch is likely stale — re-merge main." >&2
            exit 1
          fi
          cp native/ios/BackgroundUploadHandler.swift ios/Runner/
          if [ ! -f ios/Runner/BackgroundUploadHandler.swift ]; then
            echo "FATAL: cp succeeded but ios/Runner/BackgroundUploadHandler.swift not present." >&2
            exit 1
          fi
        fi

        # Android background upload Kotlin shim — package matches the
        # applicationId (com.americantv.app.upload).
        if [ -d android/app/src/main/kotlin ]; then
          if [ ! -f native/android/BackgroundUploadHandler.kt ]; then
            echo "FATAL: native/android/BackgroundUploadHandler.kt missing in repo." >&2
            exit 1
          fi
          mkdir -p android/app/src/main/kotlin/com/americantv/app/upload
          cp native/android/BackgroundUploadHandler.kt \
             android/app/src/main/kotlin/com/americantv/app/upload/
          if [ ! -f android/app/src/main/kotlin/com/americantv/app/upload/BackgroundUploadHandler.kt ]; then
            echo "FATAL: Kotlin shim cp failed." >&2
            exit 1
          fi
        fi

    - &s_ios_privacy
      name: Copy iOS privacy manifest + entitlements
      script: |
        cd $CM_BUILD_DIR/mobile
        if [ -d ios/Runner ]; then
          cp native/ios/PrivacyInfo.xcprivacy ios/Runner/
          cp native/ios/Runner.entitlements ios/Runner/
        fi

    - &s_ios_plist
      name: Patch Info.plist
      # Apple rejects builds that touch privacy-sensitive APIs without
      # NSCameraUsageDescription / NSPhotoLibraryUsageDescription / etc.
      # Also locks ATS to HTTPS-only and adds background-modes for
      # URLSession uploads + video PiP.
      script: |
        cd $CM_BUILD_DIR/mobile
        if [ ! -f ios/Runner/Info.plist ]; then exit 0; fi
        PB=/usr/libexec/PlistBuddy
        P=ios/Runner/Info.plist

        # ATS: HTTPS-only.
        $PB -c "Delete :NSAppTransportSecurity" $P || true
        $PB -c "Add :NSAppTransportSecurity dict" $P
        $PB -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool false" $P

        # Usage description strings. -c "Add" fails if the key exists, so
        # we Delete-then-Add each one to make the script idempotent.
        for pair in \
          "NSCameraUsageDescription|AmericanTV uses your camera to record video for upload to your channel." \
          "NSPhotoLibraryUsageDescription|AmericanTV needs access to your photo library so you can upload videos and thumbnails." \
          "NSPhotoLibraryAddUsageDescription|AmericanTV saves downloaded videos to your photo library." \
          "NSMicrophoneUsageDescription|AmericanTV uses your microphone to record audio with video uploads." \
          "NSUserTrackingUsageDescription|This identifier is used to deliver personalized ads to you. AmericanTV does not share this identifier with third parties."
        do
          KEY="${pair%%|*}"
          VALUE="${pair#*|}"
          $PB -c "Delete :$KEY" $P || true
          $PB -c "Add :$KEY string $VALUE" $P
        done

        # Background modes.
        $PB -c "Delete :UIBackgroundModes" $P || true
        $PB -c "Add :UIBackgroundModes array" $P
        $PB -c "Add :UIBackgroundModes:0 string audio" $P
        $PB -c "Add :UIBackgroundModes:1 string fetch" $P
        $PB -c "Add :UIBackgroundModes:2 string processing" $P

        # Encryption export compliance — using only standard TLS / Apple
        # frameworks, exempt under ECCN 5D992.c.
        $PB -c "Delete :ITSAppUsesNonExemptEncryption" $P || true
        $PB -c "Add :ITSAppUsesNonExemptEncryption bool false" $P

        # Google Sign-In iOS configuration. Mirrors CLIENT_ID and
        # REVERSED_CLIENT_ID from ios/Runner/GoogleService-Info.plist so
        # GoogleSignIn SDK 7.x can locate its OAuth client and intercept
        # the redirect callback. Without GIDClientID OR the URL scheme,
        # GoogleSignIn().signIn() throws "client ID not found" / never
        # gets the auth code back from Safari.
        GID_CLIENT_ID="92747944753-hs9tda8eeusc2g3nj3c0mu2schc0dljp.apps.googleusercontent.com"
        REVERSED_CLIENT_ID="com.googleusercontent.apps.92747944753-hs9tda8eeusc2g3nj3c0mu2schc0dljp"

        $PB -c "Delete :GIDClientID" $P || true
        $PB -c "Add :GIDClientID string $GID_CLIENT_ID" $P

        # Register the reversed-client-id URL scheme. iOS uses CFBundleURLTypes
        # (array of dicts, each with a CFBundleURLSchemes array). Idempotent
        # via a full Delete-then-Add of the parent key.
        $PB -c "Delete :CFBundleURLTypes" $P || true
        $PB -c "Add :CFBundleURLTypes array" $P
        $PB -c "Add :CFBundleURLTypes:0 dict" $P
        $PB -c "Add :CFBundleURLTypes:0:CFBundleTypeRole string Editor" $P
        $PB -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" $P
        $PB -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string $REVERSED_CLIENT_ID" $P

    - &s_android_proguard
      name: Copy Android proguard rules + network security config
      script: |
        cd $CM_BUILD_DIR/mobile
        if [ -d android/app ]; then
          cp native/android/proguard-rules.pro android/app/
          mkdir -p android/app/src/main/res/xml
          cp native/android/network_security_config.xml \
             android/app/src/main/res/xml/
        fi

    - &s_android_release
      name: Wire Android release shrinking + network security config
      # As of 3.0.0+14 the committed build.gradle + AndroidManifest.xml
      # already carry the proguard + networkSecurityConfig wiring (see
      # commit 87204c9). This step is now a backstop: it inserts the
      # bits only if they're absent — useful if a future `flutter create`
      # ever overwrites them, useless otherwise.
      script: |
        cd $CM_BUILD_DIR/mobile
        if [ ! -f android/app/build.gradle ]; then exit 0; fi

        MF=android/app/src/main/AndroidManifest.xml
        if ! grep -q 'networkSecurityConfig' $MF; then
          sed -i.bak 's|<application|<application android:networkSecurityConfig="@xml/network_security_config"|' $MF
        fi

        BG=android/app/build.gradle
        if ! grep -q "proguardFiles" $BG; then
          /usr/bin/env perl -i -pe 'BEGIN{undef $/;} s|signingConfig\s*=\s*signingConfigs.debug|signingConfig = signingConfigs.release\n            minifyEnabled = true\n            shrinkResources = true\n            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"|;' $BG
        fi

        # Sanity check: Codemagic's android_signing integration should
        # have populated CM_KEYSTORE_PATH if the keystore name in the
        # workflow matched an uploaded keystore. Log it so failed-
        # signing builds show a clear "no keystore was attached" line
        # in the log.
        if [ -n "${CM_KEYSTORE_PATH:-}" ]; then
          echo "[android-signing] keystore injected at $CM_KEYSTORE_PATH"

          # Extract and print the SHA-1 and SHA-256 of the upload key so
          # they can be registered in Firebase Console → Project settings
          # → Android app → Add fingerprint. Required for Google Sign-In
          # to succeed on TestFlight/Play distributions (the debug
          # keystore SHA-1 is irrelevant for those builds). Failures
          # here are non-fatal — keytool absence shouldn't block the AAB.
          if command -v keytool >/dev/null 2>&1 && [ -n "${CM_KEYSTORE_PASSWORD:-}" ]; then
            ALIAS="${CM_KEY_ALIAS:-upload}"
            echo "[android-signing] Upload key fingerprints (register these in Firebase for Google Sign-In on Play):"
            keytool -list -v \
              -keystore "$CM_KEYSTORE_PATH" \
              -alias "$ALIAS" \
              -storepass "$CM_KEYSTORE_PASSWORD" \
              2>/dev/null | grep -E 'SHA1:|SHA256:' || \
              echo "[android-signing]   (keytool could not read alias '$ALIAS' — check CM_KEY_ALIAS)"
            echo "[android-signing] NOTE: For end users installing from Play Store, you ALSO need"
            echo "[android-signing] the Play App Signing SHA-1 — find it in Play Console → Setup →"
            echo "[android-signing] App signing → App signing key certificate."
          fi
        else
          echo "[android-signing] WARNING: CM_KEYSTORE_PATH is empty." >&2
          echo "[android-signing] No keystore attached. The AAB will sign with the debug key" >&2
          echo "[android-signing] and Play Store will reject it. Confirm Codemagic Teams →" >&2
          echo "[android-signing] Code signing identities → Android keystores has an entry" >&2
          echo "[android-signing] named 'uploadkey'." >&2
        fi

    - &s_icon_generate
      name: Generate launcher icons
      # PNG masters are committed at mobile/assets/icon/. The earlier
      # env-var-base64 fallback was retired once the binaries went into
      # git (3.0.0+14, commit 87204c9): every clone now has the icon
      # sources on disk, so flutter_launcher_icons runs unconditionally
      # and the build can't accidentally ship the Flutter default.
      script: |
        cd $CM_BUILD_DIR/mobile
        if [ ! -f assets/icon/app-icon.png ]; then
          echo "FATAL: mobile/assets/icon/app-icon.png is missing." >&2
          echo "It should be tracked in git from 3.0.0+14 onward." >&2
          echo "Re-merge main or restore the file before retrying." >&2
          exit 1
        fi
        dart run flutter_launcher_icons

    - &s_ids_rewrite
      name: Rewrite platform identifiers
      # flutter create with --org com.americantv would produce
      # com.americantv.americantv on both platforms. We need:
      #   Android applicationId/namespace: com.americantv.app
      #   iOS    PRODUCT_BUNDLE_IDENTIFIER: com.americantv.userapp
      # Each sed is guarded so the script is safe on either platform-only
      # workflow, AND each sed is post-verified — a successful sed on a
      # different file format (e.g. Xcode binary plist) would leave a
      # corrupted file behind without the assert step.
      script: |
        cd $CM_BUILD_DIR/mobile

        # Flutter 3.24+ generates Groovy build.gradle using Kotlin-style
        # `applicationId = "..."` assignments rather than the older
        # `applicationId "..."` (no equals). Try both with sed; only
        # one of the two patches lands per file.
        for GRADLE in android/app/build.gradle android/app/build.gradle.kts; do
          [ -f "$GRADLE" ] || continue
          sed -i.bak "s/applicationId = \"[^\"]*\"/applicationId = \"com.americantv.app\"/" "$GRADLE"
          sed -i.bak "s/applicationId \"[^\"]*\"/applicationId \"com.americantv.app\"/" "$GRADLE"
          sed -i.bak "s/namespace = \"[^\"]*\"/namespace = \"com.americantv.app\"/" "$GRADLE"
          sed -i.bak "s/namespace \"[^\"]*\"/namespace \"com.americantv.app\"/" "$GRADLE"
          # Accept either syntax post-rewrite.
          grep -qE 'applicationId\s*=?\s*"com\.americantv\.app"' "$GRADLE" || {
            echo "FATAL: applicationId rewrite failed in $GRADLE." >&2
            grep "applicationId" "$GRADLE" >&2 || true
            exit 1
          }
        done

        if [ -f ios/Runner.xcodeproj/project.pbxproj ]; then
          sed -i.bak \
            "s/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = com.americantv.userapp;/" \
            ios/Runner.xcodeproj/project.pbxproj
          # Count post-rewrite occurrences — Xcode emits one per build
          # configuration (typically 3-6). Zero means sed didn't match
          # (binary plist? old format?); we'd ship the wrong bundle.
          MATCHES=$(grep -c "PRODUCT_BUNDLE_IDENTIFIER = com.americantv.userapp;" ios/Runner.xcodeproj/project.pbxproj || true)
          if [ "$MATCHES" -lt 1 ]; then
            echo "FATAL: PRODUCT_BUNDLE_IDENTIFIER rewrite produced 0 matches." >&2
            echo "project.pbxproj may be in an unexpected format (binary plist?)." >&2
            exit 1
          fi
          echo "[ids] PRODUCT_BUNDLE_IDENTIFIER set in $MATCHES build configurations."
        fi

    - &s_env_file
      name: Write .env from group variables
      # pubspec declares `.env` as a Flutter asset. flutter analyze fails
      # if the file is missing, so write it BEFORE pub_get / analyze
      # rather than after. RevenueCat and Google OAuth values are
      # optional — empty values disable the feature at runtime instead
      # of failing the build.
      script: |
        cd $CM_BUILD_DIR/mobile
        cat > .env <<EOF
        API_BASE_URL=https://americantv.vip/api/v1
        REVENUECAT_IOS_KEY=$REVENUECAT_IOS_KEY
        REVENUECAT_ANDROID_KEY=$REVENUECAT_ANDROID_KEY
        GOOGLE_OAUTH_CLIENT_ID_ANDROID=$GOOGLE_OAUTH_CLIENT_ID_ANDROID
        ENABLE_CRASHLYTICS=true
        EOF

    - &s_pub_get
      name: Resolve dependencies
      script: |
        cd $CM_BUILD_DIR/mobile
        flutter pub get

    - &s_codegen
      name: Run codegen
      script: |
        cd $CM_BUILD_DIR/mobile
        dart run build_runner build --delete-conflicting-outputs

    - &s_analyze_test
      name: Analyze + test
      script: |
        cd $CM_BUILD_DIR/mobile
        flutter analyze --no-fatal-infos
        flutter test --reporter=expanded

  env_groups_production: &env_groups_production
    groups:
      - americantv-prod  # holds API_BASE_URL, REVENUECAT_*, GOOGLE_OAUTH_*, etc.

workflows:
  # =====================================================================
  # iOS — TestFlight
  # =====================================================================
  ios-testflight:
    name: iOS — TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      <<: *setup_flutter
      <<: *env_groups_production
      vars:
        BUNDLE_ID: com.americantv.userapp
        APP_STORE_APP_ID: 6743315031
        APPLE_TEAM_ID: PDNU7JKBQZ
        XCODE_WORKSPACE: ios/Runner.xcworkspace
        XCODE_SCHEME: Runner
        # TestFlight is willing to ship a Flutter-default icon during
        # internal-tester smoke runs. App Store Review isn't (see
        # ios-app-store workflow).
    integrations:
      app_store_connect: americantv-app-store
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
        - $HOME/.pub-cache
        - $CM_BUILD_DIR/mobile/.dart_tool

    scripts:
      - *s_preflight
      - *s_versions
      - *s_create_platforms
      - *s_native_shims
      - *s_ios_privacy
      - *s_ios_plist
      - *s_android_proguard
      - *s_android_release
      - *s_icon_generate
      - *s_ids_rewrite
      - *s_env_file
      - *s_pub_get
      - *s_codegen
      - *s_analyze_test

      - name: Verify Firebase iOS config
        # GoogleService-Info.plist lives in the repo at
        # mobile/ios/Runner/GoogleService-Info.plist. The Flutter build
        # discovers it automatically from that path. Earlier versions
        # decoded a base64 env var; the committed-file approach is one
        # less Codemagic secret to keep in sync.
        #
        # Crashlytics symbol upload below treats a missing file as
        # "Firebase intentionally not configured" and skips gracefully,
        # so a brand-new clone without Firebase keys still builds.
        script: |
          cd $CM_BUILD_DIR/mobile
          if [ -f ios/Runner/GoogleService-Info.plist ]; then
            echo "[firebase-ios] config present at ios/Runner/GoogleService-Info.plist"
          else
            echo "[firebase-ios] config not committed — Firebase iOS features will be inactive."
          fi

      - name: Install CocoaPods
        script: |
          cd $CM_BUILD_DIR/mobile/ios
          pod install

      - name: Set bundle identifier + version
        script: |
          cd $CM_BUILD_DIR/mobile
          # Codemagic sets BUILD_NUMBER from App Store Connect's latest +1.
          # BUILD_VERSION comes from the env group; bump per release.
          xcrun agvtool new-version -all $BUILD_NUMBER
          xcrun agvtool new-marketing-version $BUILD_VERSION

      - name: Configure code signing
        script: |
          keychain initialize
          # Pulls cert + provisioning profile from the App Store Connect
          # integration. Filters to our bundle id + Distribution type.
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build IPA
        script: |
          cd $CM_BUILD_DIR/mobile
          flutter build ipa --release \
            --build-name=$BUILD_VERSION \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

      - name: Upload dSYMs to Crashlytics
        # Crashlytics needs the debug symbols to symbolicate crash
        # reports. iOS releases ship stripped binaries, so without this
        # step every crash on TestFlight shows as a hex address tree.
        # Skips gracefully if the iOS Firebase config file isn't in the repo.
        script: |
          cd $CM_BUILD_DIR/mobile
          if [ ! -f ios/Runner/GoogleService-Info.plist ]; then
            echo "Firebase not configured — skipping dSYM upload."
            exit 0
          fi
          UPLOADER=$(find ios/Pods -name 'upload-symbols' -type f | head -n 1)
          if [ -z "$UPLOADER" ]; then
            echo "upload-symbols binary not in Pods/FirebaseCrashlytics — Crashlytics pod likely missing."
            exit 0
          fi
          DSYMS_DIR=$(find build/ios/archive -type d -name 'dSYMs' | head -n 1)
          if [ -z "$DSYMS_DIR" ] || [ ! -d "$DSYMS_DIR" ]; then
            echo "No dSYMs directory found under build/ios/archive — skipping."
            exit 0
          fi
          "$UPLOADER" \
            -gsp ios/Runner/GoogleService-Info.plist \
            -p ios \
            "$DSYMS_DIR"

    artifacts:
      - mobile/build/ios/ipa/*.ipa
      - mobile/build/ios/archive/**/dSYMs/**
      - /tmp/xcodebuild_logs/*.log
      - mobile/flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
      email:
        # Hardcoded rather than $RELEASE_NOTIFY_EMAIL because Codemagic
        # validates this field at config-parse time before env vars are
        # expanded, and a $-reference resolves to null then. To rotate
        # the destination, edit the YAML.
        recipients:
          - toni@vitalclick.co.za
        notify:
          success: true
          failure: true

  # =====================================================================
  # iOS — App Store Review
  # =====================================================================
  ios-app-store:
    name: iOS — App Store Review
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      <<: *setup_flutter
      <<: *env_groups_production
      vars:
        BUNDLE_ID: com.americantv.userapp
        APP_STORE_APP_ID: 6743315031
        APPLE_TEAM_ID: PDNU7JKBQZ
    integrations:
      app_store_connect: americantv-app-store

    scripts:
      - *s_preflight
      - *s_versions
      - *s_create_platforms
      - *s_native_shims
      - *s_ios_privacy
      - *s_ios_plist
      - *s_android_proguard
      - *s_android_release
      - *s_icon_generate
      - *s_ids_rewrite
      - *s_env_file
      - *s_pub_get
      - *s_codegen
      - *s_analyze_test
      - name: Verify Firebase iOS config
        script: |
          cd $CM_BUILD_DIR/mobile
          if [ ! -f ios/Runner/GoogleService-Info.plist ]; then
            echo "FATAL: mobile/ios/Runner/GoogleService-Info.plist missing." >&2
            echo "App Store builds require Firebase configured. Commit the" >&2
            echo "plist from Firebase Console → Project settings → iOS app." >&2
            exit 1
          fi
      - name: Install CocoaPods
        script: |
          cd $CM_BUILD_DIR/mobile/ios
          pod install
      - name: Set bundle identifier + version
        script: |
          cd $CM_BUILD_DIR/mobile
          xcrun agvtool new-version -all $BUILD_NUMBER
          xcrun agvtool new-marketing-version $BUILD_VERSION
      - name: Configure code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA
        script: |
          cd $CM_BUILD_DIR/mobile
          flutter build ipa --release \
            --build-name=$BUILD_VERSION \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist

      - name: Upload dSYMs to Crashlytics
        script: |
          cd $CM_BUILD_DIR/mobile
          if [ ! -f ios/Runner/GoogleService-Info.plist ]; then
            echo "Firebase not configured — skipping dSYM upload."
            exit 0
          fi
          UPLOADER=$(find ios/Pods -name 'upload-symbols' -type f | head -n 1)
          DSYMS_DIR=$(find build/ios/archive -type d -name 'dSYMs' | head -n 1)
          if [ -z "$UPLOADER" ] || [ -z "$DSYMS_DIR" ]; then
            echo "Missing upload-symbols binary or dSYMs directory — skipping."
            exit 0
          fi
          "$UPLOADER" \
            -gsp ios/Runner/GoogleService-Info.plist \
            -p ios \
            "$DSYMS_DIR"

    artifacts:
      - mobile/build/ios/ipa/*.ipa
      - mobile/build/ios/archive/**/dSYMs/**
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        # Submits the build to App Store Review (not TestFlight).
        submit_to_app_store: true
      email:
        # Hardcoded rather than $RELEASE_NOTIFY_EMAIL because Codemagic
        # validates this field at config-parse time before env vars are
        # expanded, and a $-reference resolves to null then. To rotate
        # the destination, edit the YAML.
        recipients:
          - toni@vitalclick.co.za

  # =====================================================================
  # Android — Internal Testing
  # =====================================================================
  android-internal:
    name: Android — Internal Testing
    max_build_duration: 60
    environment:
      <<: *setup_flutter
      <<: *env_groups_production
      android_signing:
        - uploadkey
      vars:
        PACKAGE_NAME: com.americantv.app
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - $HOME/.pub-cache
        - $CM_BUILD_DIR/mobile/.dart_tool

    scripts:
      - *s_preflight
      - *s_versions
      - *s_create_platforms
      - *s_native_shims
      - *s_ios_privacy
      - *s_ios_plist
      - *s_android_proguard
      - *s_android_release
      - *s_icon_generate
      - *s_ids_rewrite
      - *s_env_file
      - *s_pub_get
      - *s_codegen
      - *s_analyze_test

      - name: Verify Firebase Android config
        # google-services.json lives in the repo at
        # mobile/android/app/google-services.json. The Gradle plugin
        # picks it up from that path during the AAB build. Internal
        # track tolerates a missing file (Firebase features just stay
        # inactive at runtime); production requires it.
        script: |
          cd $CM_BUILD_DIR/mobile
          if [ -f android/app/google-services.json ]; then
            echo "[firebase-android] config present at android/app/google-services.json"
          else
            echo "[firebase-android] config not committed — Firebase Android features will be inactive."
          fi

      - name: Bump versionCode + versionName
        # versionCode = $BUILD_NUMBER, versionName = $BUILD_VERSION.
        # Flutter reads these via --build-name + --build-number.
        script: echo "Using build-name=$BUILD_VERSION build-number=$BUILD_NUMBER"

      - name: Build AAB
        script: |
          cd $CM_BUILD_DIR/mobile
          # Play Console wants the AAB; sideloading / direct distribution
          # wants the APK. Both build from the same intermediate
          # artifacts so the second invocation reuses Gradle's cache and
          # adds ~30s rather than doubling the time.
          flutter build appbundle --release \
            --build-name=$BUILD_VERSION \
            --build-number=$BUILD_NUMBER
          flutter build apk --release \
            --build-name=$BUILD_VERSION \
            --build-number=$BUILD_NUMBER

    artifacts:
      # Manual upload to Play Console Internal Testing.
      # Download from the Codemagic build page → Artifacts.
      - mobile/build/app/outputs/bundle/release/app-release.aab
      - mobile/build/app/outputs/flutter-apk/app-release.apk
      - mobile/build/app/outputs/mapping/release/mapping.txt

    publishing:
      email:
        recipients:
          - toni@vitalclick.co.za

  # =====================================================================
  # Android — Production
  # =====================================================================
  android-production:
    name: Android — Production
    max_build_duration: 60
    environment:
      <<: *setup_flutter
      <<: *env_groups_production
      android_signing:
        - uploadkey
      vars:
        PACKAGE_NAME: com.americantv.app
        # Production builds must ship the brand icon; missing icon fails.

    scripts:
      - *s_preflight
      - *s_versions
      - *s_create_platforms
      - *s_native_shims
      - *s_ios_privacy
      - *s_ios_plist
      - *s_android_proguard
      - *s_android_release
      - *s_icon_generate
      - *s_ids_rewrite
      - *s_env_file
      - *s_pub_get
      - *s_codegen
      - *s_analyze_test
      - name: Verify Firebase Android config
        # Production builds require Firebase to surface crash reports.
        script: |
          cd $CM_BUILD_DIR/mobile
          if [ ! -f android/app/google-services.json ]; then
            echo "FATAL: mobile/android/app/google-services.json missing." >&2
            echo "Production builds require Firebase. Commit the JSON" >&2
            echo "from Firebase Console → Project settings → Android app." >&2
            exit 1
          fi
      - name: Build AAB
        script: |
          cd $CM_BUILD_DIR/mobile
          # Play Console wants the AAB; sideloading / direct distribution
          # wants the APK. Both build from the same intermediate
          # artifacts so the second invocation reuses Gradle's cache and
          # adds ~30s rather than doubling the time.
          flutter build appbundle --release \
            --build-name=$BUILD_VERSION \
            --build-number=$BUILD_NUMBER
          flutter build apk --release \
            --build-name=$BUILD_VERSION \
            --build-number=$BUILD_NUMBER

    artifacts:
      # Manual upload to Play Console Production track.
      # Production releases need a staged rollout: in Play Console after
      # uploading, set rollout to 5% in the Play Console, monitor
      # Crashlytics + ANRs for 24h, then ramp.
      - mobile/build/app/outputs/bundle/release/app-release.aab
      - mobile/build/app/outputs/flutter-apk/app-release.apk
      - mobile/build/app/outputs/mapping/release/mapping.txt

    publishing:
      email:
        recipients:
          - toni@vitalclick.co.za
